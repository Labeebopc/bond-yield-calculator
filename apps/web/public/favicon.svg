<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Rounded Rectangle Base -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#grad)" filter="url(#shadow)" />

  <!-- Stylized Growth Chart -->
  <path d="M 25 70 L 42 45 L 58 55 L 75 28" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M 55 28 L 75 28 L 75 48" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Subtle % sign element background -->
  <circle cx="35" cy="35" r="5" fill="#ffffff" opacity="0.9" />
  <circle cx="65" cy="65" r="5" fill="#ffffff" opacity="0.9" />
</svg>
